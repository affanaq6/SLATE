<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <title>SLATE Project</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
    </style>
</head>

<body>

    <script>
        let isDrawing = false;
        let nlpOutput = ''; // Assume this variable holds the NLP output

        function setup() {
            createCanvas(600, 400);
            background(255);
        }

        function draw() {
            // Draw animations based on NLP output
            if (nlpOutput === 'water cycle') {
                drawWaterCycleAnimation();
            }

            // Dynamic animations based on user input
            if (isDrawing) {
                drawUserLines();
            }
        }

        function mousePressed() {
            isDrawing = true;
        }

        function mouseReleased() {
            isDrawing = false;
        }

        function drawUserLines() {
            // Draw lines based on user input
            strokeWeight(4);
            stroke(0);
            line(pmouseX, pmouseY, mouseX, mouseY);
        }

        function drawWaterCycleAnimation() {
            // Your water cycle animations go here
            fill(0, 0, 255);
            ellipse(width / 2, height / 2, 100, 100); // Example: Blue circle
        }
    </script>

</body>

</html>
