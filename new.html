  // Function to make an API request to OpenAI GPT-3
  async function performNLP(query) {
    const apiUrl = 'https://api.apilayer.com/nlp/lang_detect'; // Replace with the correct API endpoint

    try {
      const response = await fetch(apiUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          prompt: query,
          max_tokens: 100,
        }),
      });

      const data = await response.json();
      if (data.choices && data.choices.length > 0) {
        return data.choices[0].text.trim();
      }
      return '';
    } catch (error) {
      console.error('Error making API request:', error);
      return '';
    }
  }
